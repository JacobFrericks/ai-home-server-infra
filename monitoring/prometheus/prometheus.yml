global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# No Alertmanager is deployed in v1 — alerts fire and are visible in the
# Prometheus/Grafana "Alerting" UI, but nothing routes/notifies yet. See
# README.md "Alerts" section.
alerting:
  alertmanagers: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: nvidia-gpu-exporter
    static_configs:
      - targets: ["nvidia-gpu-exporter:9835"]

  - job_name: plex-exporter
    static_configs:
      - targets: ["plex-exporter:9922"]

  # Home Assistant's built-in `prometheus:` integration. Auth via a
  # long-lived access token written to the server-only, git-ignored
  # ha_token file (see README.md "Home Assistant integration").
  - job_name: home-assistant
    metrics_path: /api/prometheus
    bearer_token_file: /etc/prometheus/ha_token
    static_configs:
      - targets: ["host.docker.internal:8123"]

  # Blackbox probes of app services that live on the host network and don't
  # expose their own /metrics. Ollama has no /metrics either — it only gets
  # an up-probe here (its actual load is visible via GPU + cAdvisor).
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:8080/health   # open-webui
          - http://host.docker.internal:32400/identity # plex
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - host.docker.internal:10200 # piper
          - host.docker.internal:10300 # whisper
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
