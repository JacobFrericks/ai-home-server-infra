name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate compose file
        env:
          # Any non-empty value satisfies interpolation; this is NOT a real secret.
          WEBUI_SECRET_KEY: ci-dummy-not-a-real-secret
        run: docker compose -f docker-compose.yml config -q

      - name: Lint YAML
        run: |
          pipx install yamllint
          yamllint -d relaxed docker-compose.yml .github/

      - name: Scan for committed secrets
        # Full-history scan via the gitleaks CLI. We don't use gitleaks-action's
        # push-range diffing because it derefs <base>^ and fails on a repo's root
        # commit (initial push). `gitleaks git .` scans all history deterministically.
        run: |
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks git . --redact -v --exit-code 2 --config .gitleaks.toml
