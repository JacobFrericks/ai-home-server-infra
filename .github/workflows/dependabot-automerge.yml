name: Dependabot auto-merge

# Policy: auto-merge any image patch/minor bump once CI passes, EXCEPT
# Home Assistant (smart-home risk stays manual regardless of bump size).
# ALL major bumps (including Ollama) also stay open for manual review.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge for patch/minor (excluding Home Assistant)
        if: >-
          !contains(steps.meta.outputs.dependency-names, 'home-assistant') &&
          (steps.meta.outputs.update-type == 'version-update:semver-patch' ||
           steps.meta.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
