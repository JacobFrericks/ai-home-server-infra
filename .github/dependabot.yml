version: 2
updates:
  # Watches the pinned image: tags in docker-compose.yml and opens a PR per
  # available bump. NOTE: must be "docker-compose", not "docker" — the plain
  # "docker" ecosystem only scans Dockerfiles/Kubernetes YAML, not compose files.
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"

  # Same mechanism for the separate monitoring stack's pinned image tags.
  - package-ecosystem: "docker-compose"
    directory: "/monitoring"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "monitoring"
    commit-message:
      prefix: "chore(deps)"
