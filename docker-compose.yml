services:
  ollama:
    image: ollama/ollama:0.32.1
    container_name: ollama
    network_mode: host
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=127.0.0.1:11434
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /usr/share/ollama/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    network_mode: host
    restart: unless-stopped
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_SIGNUP=false
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      # Web search is via the searxng-mcp MCP server (see README "Web search via
      # MCP"), NOT Open WebUI's native web search — that is disabled at runtime
      # (web.search.enable=false in the open-webui DB). Set here so a fresh
      # install also starts with the native toggle off.
      - ENABLE_WEB_SEARCH=false
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama

  # Self-hosted SearXNG metasearch — gives the local LLMs web access with no API
  # keys and no queries leaving to a third-party aggregator. Published on LOOPBACK
  # only (127.0.0.1:8888) so it never touches the LAN; only outbound traffic is
  # SearXNG -> public search engines. Config lives in ./searxng: settings.yml is
  # git-ignored (holds a real secret_key, server-only) and generated from
  # settings.yml.example. The JSON output format MUST be enabled in settings.yml
  # or open-webui gets HTTP 403 from the search API.
  searxng:
    image: searxng/searxng:2026.7.11-62a1ab7ed
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8888/

  # Web-search MCP server backing the Home Assistant voice Assist agent. Wraps
  # the SearXNG instance above as an MCP tool. Runs in streamable-HTTP mode
  # (HA's MCP Client integration supports streamable-HTTP first, SSE fallback)
  # and binds LOOPBACK ONLY (MCP_HTTP_HOST=127.0.0.1) — never on the LAN, no ufw
  # rule. host networking lets it both reach SearXNG at 127.0.0.1:8888 and be
  # reachable by the host-networked homeassistant container at 127.0.0.1:9200.
  # HA connects to it at http://127.0.0.1:9200/mcp (see README "Voice web search").
  searxng-mcp:
    image: isokoliuk/mcp-searxng:1.11.1
    container_name: searxng-mcp
    network_mode: host
    restart: unless-stopped
    environment:
      - SEARXNG_URL=http://127.0.0.1:8888
      - MCP_HTTP_HOST=127.0.0.1
      - MCP_HTTP_PORT=9200
    depends_on:
      - searxng

  # ComfyUI — local SDXL text-to-image backend for the image-generation feature.
  # Published on LOOPBACK ONLY (127.0.0.1:8188), like SearXNG, so it never touches
  # the LAN; both front-ends reach it over loopback — open-webui via comfyui-mcp
  # below, and Home Assistant's AI Task integration (ComfyUI-Home-Assistant, a
  # runtime custom_component — see README). Shares the RTX 3090 with Ollama/Plex,
  # so VRAM strategy is "free-between-gens". ComfyUI's default DynamicVRAM already
  # UNLOADS models to CPU after each run (no flag needed — --highvram would be the
  # opt-in to pin them, which we do NOT set), so SDXL (~8-10 GB) only holds the GPU
  # during the ~10-20s generation window; comfyui-mcp also POSTs /free as a belt-
  # and-braces release. The SDXL checkpoint (sd_xl_base_1.0.safetensors) is a
  # MANUAL download into the comfyui-data volume at ComfyUI/models/checkpoints.
  comfyui:
    image: mmartial/comfyui-nvidia-docker:ubuntu24_cuda13.1-20260605
    container_name: comfyui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8188:8188"
    environment:
      - WANTED_UID=1000
      - WANTED_GID=1000
      - SECURITY_LEVEL=normal
    volumes:
      # /comfy/mnt is the image's run dir: ComfyUI source, venv, and (no
      # BASE_DIRECTORY set) the models/input/output tree under ComfyUI/.
      - comfyui-data:/comfy/mnt
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # comfyui-mcp — MCP server exposing a `generate_image` tool that drives ComfyUI
  # above. Mirrors searxng-mcp exactly: streamable-HTTP, LOOPBACK ONLY
  # (127.0.0.1:9300), host networking so it reaches ComfyUI at 127.0.0.1:8188 and
  # is reachable by the host-networked open-webui. Attached to the gemma4:12b
  # workspace model in Open WebUI as an always-on tool (runtime — see README).
  # Built locally (no upstream image); the local image: tag lets `docker compose
  # pull --ignore-buildable` skip it. Never touches Ollama.
  comfyui-mcp:
    build: ./comfyui-mcp
    image: comfyui-mcp:local
    container_name: comfyui-mcp
    network_mode: host
    restart: unless-stopped
    environment:
      - COMFYUI_URL=http://127.0.0.1:8188
      - MCP_HTTP_HOST=127.0.0.1
      - MCP_HTTP_PORT=9300
      # Delivery via Open WebUI's files API: generated images are uploaded and
      # returned as an ABSOLUTE-URL markdown image so they render in both the
      # browser AND the Conduit mobile client (a relative URL renders broken in
      # Conduit). Upload auth is a JWT the MCP mints from WEBUI_SECRET_KEY.
      # OWUI_PUBLIC_URL must match the origin clients use to reach Open WebUI
      # (same-origin is required for the mobile client to attach its auth token).
      - OWUI_UPLOAD_URL=http://127.0.0.1:8080
      - OWUI_PUBLIC_URL=${OWUI_PUBLIC_URL}
      - OWUI_USER_ID=${OWUI_USER_ID}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    depends_on:
      - comfyui

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.7.3
    container_name: homeassistant
    network_mode: host
    # privileged: true  # disabled 2026-07-11 (security audit): full privileged not needed; BT uses cap_add below
    cap_add:
      - NET_ADMIN   # Bluetooth adapter management (habluetooth)
      - NET_RAW     # Bluetooth adapter management (habluetooth)
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jacob/Documents/homeassistant:/config
      - /run/dbus:/run/dbus:ro

  piper:
    image: rhasspy/wyoming-piper:2.3.1
    container_name: piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    command: --voice en_US-hfc_female-medium

  whisper:
    image: rhasspy/wyoming-whisper:3.5.0
    container_name: whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - /home/jacob/Documents/whisper:/data
    command: --model tiny-int8 --language en

  # Plex (LinuxServer.io) — CUT OVER from the native .deb on 2026-07-10; the
  # native package was subsequently REMOVED (apt remove, NOT purge). This
  # container owns :32400. Config/DB live in /home/jacob/docker/plex/config
  # (uid/gid 1000); the media libraries are bind-mounted below at their original
  # absolute paths so the DB resolves them with no re-matching.
  # NOTE: the media dirs live inside /var/lib/plexmediaserver/Library, which is
  # the old native package's data dir. NEVER `apt purge plexmediaserver` — its
  # postrm rm -rf's that path only on purge; non-purge removal kept the media.
  plex:
    image: lscr.io/linuxserver/plex:1.43.2.10687-563d026ea-ls312
    container_name: plex
    network_mode: host
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - VERSION=docker
    volumes:
      - /home/jacob/docker/plex/config:/config
      # Media libraries are bind-mounted at their ORIGINAL absolute paths so the
      # copied Plex DB (which records these paths) resolves them unchanged — no
      # library re-matching. Both dirs are owned uid/gid 1000 (jacob).
      - /var/lib/plexmediaserver/Library/Movies:/var/lib/plexmediaserver/Library/Movies
      - /var/lib/plexmediaserver/Library/TVShows:/var/lib/plexmediaserver/Library/TVShows
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  open-webui:
    external: true
  # ComfyUI run dir (/comfy/mnt): ComfyUI source + venv, plus the models tree
  # (incl. the manually-downloaded SDXL checkpoint) under ComfyUI/models.
  comfyui-data:
