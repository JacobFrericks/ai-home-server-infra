services:
  ollama:
    image: ollama/ollama:0.31.2
    container_name: ollama
    network_mode: host
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=127.0.0.1:11434
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /usr/share/ollama/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    network_mode: host
    restart: unless-stopped
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_SIGNUP=false
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      # Web search is via the searxng-mcp MCP server (see README "Web search via
      # MCP"), NOT Open WebUI's native web search — that is disabled at runtime
      # (web.search.enable=false in the open-webui DB). Set here so a fresh
      # install also starts with the native toggle off.
      - ENABLE_WEB_SEARCH=false
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama

  # Self-hosted SearXNG metasearch — gives the local LLMs web access with no API
  # keys and no queries leaving to a third-party aggregator. Published on LOOPBACK
  # only (127.0.0.1:8888) so it never touches the LAN; only outbound traffic is
  # SearXNG -> public search engines. Config lives in ./searxng: settings.yml is
  # git-ignored (holds a real secret_key, server-only) and generated from
  # settings.yml.example. The JSON output format MUST be enabled in settings.yml
  # or open-webui gets HTTP 403 from the search API.
  searxng:
    image: searxng/searxng:2026.7.11-62a1ab7ed
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8888/

  # Web-search MCP server backing the Home Assistant voice Assist agent. Wraps
  # the SearXNG instance above as an MCP tool. Runs in streamable-HTTP mode
  # (HA's MCP Client integration supports streamable-HTTP first, SSE fallback)
  # and binds LOOPBACK ONLY (MCP_HTTP_HOST=127.0.0.1) — never on the LAN, no ufw
  # rule. host networking lets it both reach SearXNG at 127.0.0.1:8888 and be
  # reachable by the host-networked homeassistant container at 127.0.0.1:9200.
  # HA connects to it at http://127.0.0.1:9200/mcp (see README "Voice web search").
  searxng-mcp:
    image: isokoliuk/mcp-searxng:1.11.1
    container_name: searxng-mcp
    network_mode: host
    restart: unless-stopped
    environment:
      - SEARXNG_URL=http://127.0.0.1:8888
      - MCP_HTTP_HOST=127.0.0.1
      - MCP_HTTP_PORT=9200
    depends_on:
      - searxng

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.7.1
    container_name: homeassistant
    network_mode: host
    # privileged: true  # disabled 2026-07-11 (security audit): full privileged not needed; BT uses cap_add below
    cap_add:
      - NET_ADMIN   # Bluetooth adapter management (habluetooth)
      - NET_RAW     # Bluetooth adapter management (habluetooth)
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jacob/Documents/homeassistant:/config
      - /run/dbus:/run/dbus:ro

  piper:
    image: rhasspy/wyoming-piper:2.2.2
    container_name: piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    command: --voice en_US-hfc_female-medium

  whisper:
    image: rhasspy/wyoming-whisper:3.5.0
    container_name: whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - /home/jacob/Documents/whisper:/data
    command: --model tiny-int8 --language en

  # Plex (LinuxServer.io) — CUT OVER from the native .deb on 2026-07-10; the
  # native package was subsequently REMOVED (apt remove, NOT purge). This
  # container owns :32400. Config/DB live in /home/jacob/docker/plex/config
  # (uid/gid 1000); the media libraries are bind-mounted below at their original
  # absolute paths so the DB resolves them with no re-matching.
  # NOTE: the media dirs live inside /var/lib/plexmediaserver/Library, which is
  # the old native package's data dir. NEVER `apt purge plexmediaserver` — its
  # postrm rm -rf's that path only on purge; non-purge removal kept the media.
  plex:
    image: lscr.io/linuxserver/plex:1.43.2.10687-563d026ea-ls312
    container_name: plex
    network_mode: host
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - VERSION=docker
    volumes:
      - /home/jacob/docker/plex/config:/config
      # Media libraries are bind-mounted at their ORIGINAL absolute paths so the
      # copied Plex DB (which records these paths) resolves them unchanged — no
      # library re-matching. Both dirs are owned uid/gid 1000 (jacob).
      - /var/lib/plexmediaserver/Library/Movies:/var/lib/plexmediaserver/Library/Movies
      - /var/lib/plexmediaserver/Library/TVShows:/var/lib/plexmediaserver/Library/TVShows
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  open-webui:
    external: true
