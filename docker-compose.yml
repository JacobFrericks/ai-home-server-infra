services:
  ollama:
    image: ollama/ollama:0.31.2
    container_name: ollama
    network_mode: host
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=127.0.0.1:11434
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /usr/share/ollama/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.6
    container_name: open-webui
    network_mode: host
    restart: unless-stopped
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_SIGNUP=false
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.2.1
    container_name: homeassistant
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jacob/Documents/homeassistant:/config
      - /run/dbus:/run/dbus:ro

  piper:
    image: rhasspy/wyoming-piper:2.2.2
    container_name: piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    command: --voice en_US-hfc_female-medium

  whisper:
    image: rhasspy/wyoming-whisper:3.1.0
    container_name: whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - /home/jacob/Documents/whisper:/data
    command: --model tiny-int8 --language en

  # Plex (LinuxServer.io) — DEFINED BUT NOT CUT OVER.
  # The native plexmediaserver.service (v1.43.2) still owns :32400 and the
  # ~1TB library under /var/lib/plexmediaserver. Migrating requires sudo
  # (stopping/masking the native service, chown'ing data to uid/gid 1000) so
  # it is NOT run automatically. See README.md "Plex cutover runbook" for the
  # exact manual steps.
  #
  # `profiles: [plex-cutover]` is deliberate: it keeps this service OUT of
  # a bare `docker compose up -d` (what deploy.sh's weekly cron runs, and
  # what Phase 1/4 validation used) so it can never race the native service
  # for :32400. It only starts via an explicit
  # `docker compose --profile plex-cutover up -d plex`, run by hand once the
  # runbook's sudo steps are done.
  plex:
    image: lscr.io/linuxserver/plex:1.43.2.10687-563d026ea-ls312
    container_name: plex
    profiles: ["plex-cutover"]
    network_mode: host
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - VERSION=docker
    volumes:
      - /home/jacob/docker/plex/config:/config
      - /media:/media
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  open-webui:
    external: true
